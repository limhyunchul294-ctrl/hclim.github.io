<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#374151">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="EVKMC AS">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <title>로그인 - EVKMC A/S</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      .pwa-add-tile {
        display: flex;
        align-items: center;
        gap: 0.875rem;
        width: 100%;
        margin-bottom: 1.25rem;
        padding: 0.75rem 1rem;
        border-radius: 1rem;
        border: 1px dashed #cbd5e1;
        background: linear-gradient(135deg, #f8fafc 0%, #f0f9ff 100%);
        text-align: left;
        cursor: pointer;
        touch-action: manipulation;
        min-height: 4.25rem;
        transition: background 0.15s, border-color 0.15s, transform 0.1s;
      }
      .pwa-add-tile:active { transform: scale(0.98); }
      .pwa-add-tile:hover { border-color: #38bdf8; background: #f0f9ff; }
      .pwa-add-tile-icon {
        width: 3rem;
        height: 3rem;
        border-radius: 0.75rem;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        flex-shrink: 0;
        object-fit: contain;
      }
      .pwa-add-tile-body { flex: 1; min-width: 0; }
      .pwa-add-tile-title { font-size: 0.9375rem; font-weight: 600; color: #0f172a; }
      .pwa-add-tile-desc { font-size: 0.75rem; color: #64748b; margin-top: 0.125rem; }
      .pwa-add-tile-badge {
        display: inline-block;
        margin-top: 0.35rem;
        font-size: 0.65rem;
        font-weight: 600;
        color: #0369a1;
        background: #e0f2fe;
        padding: 0.15rem 0.5rem;
        border-radius: 9999px;
      }
      .pwa-add-tile-badge-ready { background: #2563eb; color: #fff; }
      .pwa-ios-modal {
        position: fixed; inset: 0; z-index: 60;
        background: rgba(0,0,0,0.5);
        display: flex; align-items: flex-end; justify-content: center;
        padding: 1rem;
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
      }
      .pwa-ios-modal-panel {
        background: #fff; border-radius: 1rem; padding: 1.25rem;
        width: 100%; max-width: 24rem;
      }
      .pwa-install-banner {
        position: fixed; left: 0.75rem; right: 0.75rem; bottom: 1rem;
        z-index: 50; background: #1e293b; color: #fff;
        border-radius: 0.75rem; padding: 0.85rem 1rem;
        box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      }
      .pwa-install-banner-inner { display: flex; flex-direction: column; gap: 0.65rem; }
      .pwa-install-banner-actions { display: flex; gap: 0.5rem; }
      .pwa-install-btn-primary {
        flex: 1; min-height: 44px; background: #2563eb; color: #fff;
        border-radius: 0.5rem; font-weight: 600;
      }
      .pwa-install-btn-ghost { min-height: 44px; padding: 0 1rem; color: #cbd5e1; }
    </style>
</head>
<body class="bg-gray-100 grid place-items-center h-screen">

    <main id="login-container" class="w-full max-w-md mx-auto">
        <div class="bg-white rounded-3xl shadow-lg p-8">
            <!-- 로고 및 헤더 -->
            <div class="flex flex-col items-center mb-6">
                <div class="w-16 h-16 mb-4 grid place-items-center rounded-2xl bg-gray-100">
                    <img src="assets/evkmc-logo.png" alt="Logo" class="w-full h-full object-contain">
                </div>
                <h1 class="text-2xl font-bold">EVKMC A/S</h1>
                <p class="text-slate-500 mt-1">정비 기술 문서 포털</p>
            </div>

            <button type="button" id="pwa-add-tile" class="pwa-add-tile" aria-label="홈 화면에 추가">
                <img src="/assets/icon-192.png" alt="" class="pwa-add-tile-icon" width="48" height="48">
                <span class="pwa-add-tile-body">
                    <span class="pwa-add-tile-title">홈 화면에 추가</span>
                    <span class="pwa-add-tile-desc block">앱 아이콘으로 바로 실행 · 로그인 후에도 사용 가능</span>
                    <span id="pwa-add-tile-badge" class="pwa-add-tile-badge">탭하여 안내 보기</span>
                </span>
                <svg class="w-5 h-5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </button>

            <!-- 이메일 로그인 버튼 (기본) -->
            <button 
                id="email-login-btn" 
                type="button"
                class="w-full py-3 rounded-xl bg-gray-800 text-white hover:bg-gray-700 transition-colors font-medium flex items-center justify-center gap-2"
            >
                <span>📧</span>
                <span>이메일로 로그인</span>
            </button>

            <!-- 휴대폰 인증 구분선 -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">또는</span>
                </div>
            </div>

            <!-- 휴대폰 인증 (추후 업데이트 예정) -->
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center">
                <div class="text-gray-400 mb-2">
                    <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <p class="text-sm font-medium text-gray-700 mb-1">휴대폰 인증</p>
                <p class="text-xs text-gray-500">추후 업데이트 예정</p>
            </div>

            <!-- 숨겨진 휴대폰 인증 폼 (기능 비활성화) -->
            <form id="login-form" class="hidden space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium mb-1 text-slate-700">사용자계정</label>
                    <input 
                        id="username" 
                        name="username" 
                        type="text" 
                        required 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-800"
                        placeholder="사용자계정 입력"
                    >
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium mb-1 text-slate-700">휴대전화 (010-XXXX-XXXX)</label>
                    <input 
                        id="phone" 
                        name="phone" 
                        type="tel" 
                        required 
                        placeholder="010-1234-5678" 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-800"
                    >
                </div>
                <div id="otp-section" class="hidden space-y-2 pt-2">
                    <label for="otp" class="block text-sm font-medium mb-1 text-slate-700">인증번호</label>
                    <input 
                        id="otp" 
                        name="otp" 
                        type="text" 
                        inputmode="numeric" 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-800" 
                        placeholder="6자리 숫자 입력"
                    >
                </div>
                <div id="error-message" class="text-sm text-red-600 hidden text-center"></div>
                <div class="pt-2">
                    <button 
                        id="action-btn" 
                        type="submit" 
                        class="w-full py-3 rounded-xl bg-gray-800 text-white hover:bg-gray-700 transition-colors font-medium"
                    >
                        휴대전화 인증하기
                    </button>
                </div>
            </form>
        </div>

        <!-- 푸터 -->
        <footer class="text-center mt-6 text-sm text-slate-500">
            <p>&copy; <span id="year"></span> (주)이브이케이엠씨. All rights reserved.</p>
        </footer>
    </main>

    <!-- 이메일 입력 팝업 모달 -->
    <div id="email-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-xl">
            <h2 class="text-xl font-bold mb-2">이메일로 로그인</h2>
            <p class="text-sm text-gray-600 mb-4">
                사용자계정과 이메일 주소를 입력해주세요.
            </p>
            <form id="email-login-form" class="space-y-4">
                <div>
                    <label for="email-username" class="block text-sm font-medium mb-1 text-slate-700">사용자계정</label>
                    <input 
                        id="email-username" 
                        name="username" 
                        type="text" 
                        required 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-800"
                        placeholder="사용자계정 입력"
                        autocomplete="username"
                    >
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium mb-1 text-slate-700">이메일 주소</label>
                    <input 
                        id="email" 
                        name="email" 
                        type="email" 
                        required 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-800"
                        placeholder="example@email.com"
                        autocomplete="email"
                    >
                </div>
                <div id="email-error-message" class="text-sm text-red-600 hidden"></div>
                <div class="flex gap-2">
                    <button 
                        type="button"
                        id="close-email-modal"
                        class="flex-1 py-2.5 rounded-xl bg-gray-200 text-gray-800 hover:bg-gray-300 transition-colors font-medium"
                    >
                        취소
                    </button>
                    <button 
                        type="submit"
                        id="send-magic-link-btn"
                        class="flex-1 py-2.5 rounded-xl bg-gray-800 text-white hover:bg-gray-700 transition-colors font-medium"
                    >
                        로그인 링크 발송
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 이메일 발송 완료 메시지 모달 -->
    <div id="email-sent-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-xl text-center">
            <div class="text-5xl mb-4">📧</div>
            <h2 class="text-xl font-bold mb-2">이메일을 확인해주세요</h2>
            <p class="text-sm text-gray-600 mb-6" id="email-sent-message">
                입력하신 이메일 주소로 로그인 링크를 발송했습니다.<br>
                이메일의 링크를 클릭하여 로그인하세요.
            </p>
            <button 
                id="close-email-sent-modal"
                class="w-full py-2.5 rounded-xl bg-gray-800 text-white hover:bg-gray-700 transition-colors font-medium"
            >
                확인
            </button>
        </div>
    </div>

    <!-- ✅ 모듈 방식: login.js 하나만 로드하며, 필요한 모든 모듈은 login.js에서 import -->
    <script type="module" src="./js/login.js"></script>
</body>
</html>
